<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marques Lab | Laboratório de Impacto Visual</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #111;
      --accent: #FF5A1F;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: #eee; }
    .btn { background: var(--accent); color: white; padding: 16px 36px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: all 0.3s; }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,90,31,0.4); }
    .section { padding: 100px 20px; text-align: center; }
    .service-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; max-width: 1200px; margin: 40px auto; }
    .card { background: #111; padding: 32px; border-radius: 12px; transition: all 0.3s; }
    .card:hover { transform: translateY(-10px); border-color: var(--accent); }
  </style>
</head>
<body>

  <!-- HERO -->
  <section style="padding: 160px 20px; background: linear-gradient(#1a1a1a, #0a0a0a); text-align: center;">
    <img src="https://via.placeholder.com/150x150/FF5A1F/fff?text=ML" alt="Marques Lab Logo" style="width: 120px; margin-bottom: 20px;">
    <h1 style="font-size: 3.5rem;">Visual premium para artistas e eventos.</h1>
    <p style="font-size: 1.4rem; max-width: 800px; margin: 30px auto;">Do flyer ao palco, com ensaios IA profissionais.</p>
    <a href="https://wa.me/5591991805102" class="btn">Falar no WhatsApp</a>
  </section>

  <!-- Outras seções aqui... -->

  <script>
    // Animações simples
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('mouseenter', () => card.style.transform = 'scale(1.03)');
    });
  </script>
</body>
</html>
